<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGO Verification</title>
</head>
<body>
    <h1>Verify NGO</h1>
    <form action="/verify" method="POST">
        <label for="ngo_name">NGO Name:</label><br>
        <input type="text" id="ngo_name" name="ngo_name" required><br><br>
        <label for="reg_no">Registration Number:</label><br>
        <input type="text" id="reg_no" name="reg_no" required><br><br>
        <input type="submit" value="Verify">
    </form>
</body>
</html>
