<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Our NGO</title>
    <link rel="stylesheet" href="../static/styles.css"> <!-- Adjusted path -->
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="mission.html">Our Mission</a></li>
                <li><a href="involved.html">Get Involved</a></li>
                <li><a href="contact.html">Contact Us</a></li>
                <li><a href="sign-in.html">Sign In</a></li>
                <li><a href="sign-up.html">Sign Up</a></li>
                <li><a href="NGO Directory.html">NGO Directory</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="contact">
            <h2>Contact Us</h2>
            <form id="contact-form">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <button type="submit">Send Message</button>
            </form>
            <img src="https://via.placeholder.com/800x400?text=Contact+Us" alt="Contact Us">
            <p>You can also reach us at:</p>
            <p>Email: info@ourngo.org | Phone: (123) 456-7890</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Our NGO. All rights reserved.</p>
    </footer>

    <script>
        // Simple form submission handling
        document.getElementById('contact-form').addEventListener('submit', function(event) {
            event.preventDefault();
            alert('Thank you for your message! We will get back to you soon.');
            this.reset(); // Reset the form fields after submission
        });
    </script>
</body>
</html>
