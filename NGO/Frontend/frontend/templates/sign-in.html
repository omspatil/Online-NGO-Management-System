<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Our NGO</title>
    <link rel="stylesheet" href="../static/styles.css"> <!-- Adjusted path -->
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="mission.html">Our Mission</a></li>
                <li><a href="involved.html">Get Involved</a></li>
                <li><a href="contact.html">Contact Us</a></li>
                <li><a href="sign-in.html">Sign In</a></li>
                <li><a href="sign-up.html">Sign Up</a></li>
                <li><a href="NGO Directory.html">NGO Directory</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="sign-in">
            <h2>Sign In</h2>
            <form id="sign-in-form">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>

                <button type="submit">Sign In</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Our NGO. All rights reserved.</p>
    </footer>

    <script>
        // Simple form submission handling
        document.getElementById('sign-in-form').addEventListener('submit', function(event) {
            event.preventDefault();
            alert('Sign In successful!');
            this.reset(); // Reset the form fields after submission
        });
    </script>
</body>
</html>
