<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Our NGO</title>
    <link rel="stylesheet" href="../static/styles.css"> <!-- Adjusted path -->
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="mission.html">Our Mission</a></li>
                <li><a href="involved.html">Get Involved</a></li>
                <li><a href="contact.html">Contact Us</a></li>
                <li><a href="sign-in.html">Sign In</a></li>
                <li><a href="sign-up.html">Sign Up</a></li>
                <li><a href="NGO Directory.html">NGO Directory</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="sign-up">
            <h2>Sign Up</h2>
            <form id="sign-up-form">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>

                <label for="ngo-name">NGO Name:</label>
                <input type="text" id="ngo-name" name="ngo-name" required>

                <label for="location">NGO Location:</label>
                <input type="text" id="location" name="location" required>

                <label for="contact-no">Contact Number:</label>
                <input type="tel" id="contact-no" name="contact-no" required>

                <label for="unique-id">NGO Unique ID:</label>
                <input type="text" id="unique-id" name="unique-id" required>

                <label for="certificate">NGO Certificate (PDF only):</label>
                <input type="file" id="certificate" name="certificate" accept=".pdf" required>

                <button type="submit">Sign Up</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Our NGO. All rights reserved.</p>
    </footer>

    <script>
        // Simple form submission handling
        document.getElementById('sign-up-form').addEventListener('submit', function(event) {
            event.preventDefault();
            alert('Registration successful! Check your email for verification.');
            this.reset(); // Reset the form fields after submission
        });
    </script>
</body>
</html>
